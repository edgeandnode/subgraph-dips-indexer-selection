services:
  iisa:
    image: ghcr.io/edgeandnode/subgraph-dips-indexer-selection:${IISA_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - IISA_HOST=0.0.0.0
      - IISA_PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
