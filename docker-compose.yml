services:
  iisa:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - IISA_HOST=0.0.0.0
      - IISA_PORT=8080
    volumes:
      # Mount GCP credentials for BigQuery access
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./credentials.json}:/app/credentials/service-account.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
