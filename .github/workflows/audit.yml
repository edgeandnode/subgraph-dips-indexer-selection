# Audits both python dependency trees (pyproject.toml and the cronjob's
# requirements.txt) for known CVEs on every PR and push to main.
name: audit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pip-audit-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: pip install -e ".[dev]"

      - name: pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0

  pip-audit-cronjob:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: cronjobs/compute_scores/requirements.txt
