name: Rebuild CronJob Image

on:
  push:
    branches:
      - main
    paths:
      - 'cronjobs/compute_scores/**'
      - '.github/workflows/rebuild-cronjob-image.yml'
  schedule:
    # Run weekly on Sundays at 00:00 UTC to comply with MaxMind's 30-day update requirement
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/subgraph-dips-indexer-selection-cronjob
  DOCKERFILE_PATH: cronjobs/compute_scores/Dockerfile

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "sha_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "latest_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --build-arg MAXMIND_LICENSE_KEY=${{ secrets.MAXMIND_LICENSE_KEY }} \
            -t ${{ steps.tags.outputs.latest_tag }} \
            -t ${{ steps.tags.outputs.sha_tag }} \
            -f ${{ env.DOCKERFILE_PATH }} \
            cronjobs/compute_scores/

      - name: Push Docker image
        run: |
          docker push ${{ steps.tags.outputs.latest_tag }}
          docker push ${{ steps.tags.outputs.sha_tag }}

      - name: Update CronJob image tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="chore/update-cronjob-image-${{ steps.tags.outputs.sha_short }}"
          sed -i 's|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:.*|image: ${{ steps.tags.outputs.sha_tag }}|' k8s/score-computation-cronjob.yaml

          # Check if there are actual changes
          if git diff --quiet k8s/score-computation-cronjob.yaml; then
            echo "No changes to k8s yaml, skipping PR creation"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add k8s/score-computation-cronjob.yaml
          git commit -m "chore(k8s): update cronjob image to sha-${{ steps.tags.outputs.sha_short }}"
          git push -u origin "$BRANCH_NAME"

          gh pr create \
            --title "chore(k8s): update cronjob image to sha-${{ steps.tags.outputs.sha_short }}" \
            --body "Updates the CronJob to use image \`${{ steps.tags.outputs.sha_tag }}\`

          After merging, run:
          \`\`\`bash
          kubectl apply -f k8s/score-computation-cronjob.yaml
          \`\`\`"

      - name: Summary
        run: |
          echo "## Docker Image Rebuilt" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ steps.tags.outputs.latest_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA tag**: \`${{ steps.tags.outputs.sha_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **GeoLite2-City**: location lookups" >> $GITHUB_STEP_SUMMARY
          echo "- **GeoLite2-ASN**: organization lookups" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This product includes GeoLite2 data created by MaxMind, available from https://www.maxmind.com" >> $GITHUB_STEP_SUMMARY
