# confluent-kafka, base58, and protobuf are installed alongside the dev extras
# because the cronjob tests import them but they aren't declared as dev deps in
# pyproject.toml (they live in the cronjob Dockerfile).
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: this workflow only reads the repo to lint, type-check, and
# test. Pinning the token to read-only matters once the repo is public, when
# anyone can open a pull request that triggers it.
permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" confluent-kafka base58 protobuf

      - name: Lint
        run: ruff check src/ tests/ cronjobs/compute_scores/

      - name: Test
        run: pytest --tb=short -q --cov=src --cov-fail-under=75

  type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: mypy
        run: mypy
