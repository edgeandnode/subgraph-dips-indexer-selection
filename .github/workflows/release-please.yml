# Manages automated releases via release-please. On main branch pushes, first syncs
# the release manifest with git tags (via sync-manifest action), then creates/updates
# a Release PR with CHANGELOG and version bumps.

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # First, sync manifest with actual tags to prevent drift
  sync-manifest:
    runs-on: ubuntu-latest
    # Skip if commit was from github-actions bot to prevent circular triggers
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync manifest with tags
        uses: ./.github/actions/sync-manifest

  release-please:
    runs-on: ubuntu-latest
    needs: sync-manifest
    # Run even if sync-manifest was skipped (bot commits)
    if: always() && (needs.sync-manifest.result == 'success' || needs.sync-manifest.result == 'skipped')
    steps:
      - name: Check for open sync PRs
        id: check-sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SYNC_PR=$(gh pr list --repo ${{ github.repository }} --search "sync release-please manifest in:title" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$SYNC_PR" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::Skipping release-please - manifest sync PR #$SYNC_PR is open. Merge it first."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: google-github-actions/release-please-action@v4
        if: steps.check-sync.outputs.skip != 'true'
