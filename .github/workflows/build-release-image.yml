# Publishes the versioned iisa service image to GHCR when a v* release exists.
# The main-branch workflow (build-service-image.yml) already handles :latest
# and :sha-* tags on every push; this workflow only handles the versioned
# release artefact.
#
# Three trigger paths:
#   1. repository_dispatch (event_type: release-created) — emitted by
#      release-please.yml when release-please actually cuts a release. This
#      is the primary path and the reason the workflow exists in its current
#      shape: GitHub suppresses workflow runs for events initiated by
#      GITHUB_TOKEN (which release-please uses), with repository_dispatch as
#      one of two documented exceptions, so the bridge is what makes the
#      release flow work end-to-end without a PAT.
#   2. push: tags: ['v*'] — cheap safety net in case a human ever pushes
#      a v* tag directly (hotfix, manual rollback tagging). Would NOT fire
#      for release-please-generated tags because of the GITHUB_TOKEN rule.
#   3. workflow_dispatch with a tag input — manual escape hatch for
#      retroactively publishing an existing tag if a release image needs
#      rebuilding.
name: Build Release Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build and publish (e.g. v2.0.0)'
        required: true
  repository_dispatch:
    types: [release-created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag name
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_NAME="${INPUT_TAG:-${DISPATCH_TAG:-$REF_NAME}}"
          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Error: resolved tag '$TAG_NAME' does not match release tag pattern" >&2
            exit 1
          fi
          echo "name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=${REGISTRY}/${IMAGE_NAME}:$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.image_tag }}

      - name: Summary
        run: |
          echo "## Release Image Published to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ steps.tag.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ steps.tag.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
