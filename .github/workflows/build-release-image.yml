# Publishes the versioned iisa service image to GHCR when a v* release exists.
# The main-branch workflow (build-service-image.yml) already handles :latest
# and :sha-* tags on every push; this workflow only handles the versioned
# release artefact.
#
# Three trigger paths:
#   1. repository_dispatch (event_type: release-created) — emitted by
#      release-please.yml when release-please actually cuts a release. This
#      is the primary path and the reason the workflow exists in its current
#      shape: GitHub suppresses workflow runs for events initiated by
#      GITHUB_TOKEN (which release-please uses), with repository_dispatch as
#      one of two documented exceptions, so the bridge is what makes the
#      release flow work end-to-end without a PAT.
#   2. push: tags: ['v*'] — cheap safety net in case a human ever pushes
#      a v* tag directly (hotfix, manual rollback tagging). Would NOT fire
#      for release-please-generated tags because of the GITHUB_TOKEN rule.
#   3. workflow_dispatch with a tag input — manual escape hatch for
#      retroactively publishing an existing tag if a release image needs
#      rebuilding.
name: Build Release Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build and publish (e.g. v2.0.0)'
        required: true
  repository_dispatch:
    types: [release-created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  resolve:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.tag.outputs.ref }}
      tag_name: ${{ steps.tag.outputs.name }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Resolve tag name
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_NAME="${INPUT_TAG:-${DISPATCH_TAG:-$REF_NAME}}"
          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Error: resolved tag '$TAG_NAME' does not match release tag pattern" >&2
            exit 1
          fi
          echo "ref=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=${REGISTRY}/${IMAGE_NAME}:$TAG_NAME" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }})
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=release-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=release-${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-release-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge into multi-arch manifest
    needs: [resolve, build]
    if: |
      !cancelled()
      && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-release-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Glob `*` expands to digest-named files written by the build job's Export digest step.
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t ${{ needs.resolve.outputs.image_tag }} \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ needs.resolve.outputs.image_tag }}

      - name: Summary
        run: |
          echo "## Release Image Published to GHCR (multi-arch)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ needs.resolve.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ needs.resolve.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
