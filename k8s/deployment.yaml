apiVersion: apps/v1
kind: Deployment
metadata:
  name: iisa
  namespace: subgraph-dips-indexer-selection-iisa-daily-cronjob-samuel
  labels:
    app: iisa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iisa
  template:
    metadata:
      labels:
        app: iisa
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: iisa
          image: ghcr.io/edgeandnode/subgraph-dips-indexer-selection:v1.1.1 # x-release-please-version
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: IISA_HOST
              value: "0.0.0.0"
            - name: IISA_PORT
              value: "8080"
            - name: IISA_LOG_LEVEL
              value: "INFO"
            - name: SCORES_FILE_PATH
              value: "/app/scores/indexer_scores.json"
            - name: IISA_SCORES_RELOAD_INTERVAL
              value: "120"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 2Gi
          volumeMounts:
            - name: scores
              mountPath: /app/scores
      volumes:
        - name: scores
          persistentVolumeClaim:
            claimName: iisa-scores
