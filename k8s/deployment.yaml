apiVersion: apps/v1
kind: Deployment
metadata:
  name: iisa
  labels:
    app: iisa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iisa
  template:
    metadata:
      labels:
        app: iisa
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: iisa
          image: ghcr.io/edgeandnode/subgraph-dips-indexer-selection:v1.1.0 # x-release-please-version
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: IISA_HOST
              value: "0.0.0.0"
            - name: IISA_PORT
              value: "8080"
            - name: IISA_LOG_LEVEL
              value: "INFO"
            - name: IISA_NUM_DAYS_LOOKBACK
              value: "28"
            - name: IISA_GCP_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: iisa-config
                  key: gcp_project
            - name: IISA_GCP_LOCATION
              valueFrom:
                configMapKeyRef:
                  name: iisa-config
                  key: gcp_location
            - name: IISA_IPINFO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iisa-secrets
                  key: ipinfo_api_key
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /app/credentials/service-account.json
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 40Gi
          volumeMounts:
            - name: gcp-credentials
              mountPath: /app/credentials
              readOnly: true
      volumes:
        - name: gcp-credentials
          secret:
            secretName: iisa-gcp-credentials
