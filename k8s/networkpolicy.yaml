apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: iisa-allow-dipper-and-score-computation
  labels:
    app: iisa
spec:
  podSelector:
    matchLabels:
      app: iisa
  policyTypes:
    - Ingress
  ingress:
    - from:
        # namespaceSelector + podSelector in one entry: dipper pods in the dipper
        # namespace. A bare podSelector would only match within this namespace.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dipper
          podSelector:
            matchLabels:
              app: dipper
        - podSelector:
            matchLabels:
              app: iisa-score-computation
      ports:
        - protocol: TCP
          port: 8080
