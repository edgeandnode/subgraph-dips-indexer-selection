apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: iisa-allow-dipper-and-score-computation
  labels:
    app: iisa
spec:
  podSelector:
    matchLabels:
      app: iisa
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dipper
        - podSelector:
            matchLabels:
              app: iisa-score-computation
      ports:
        - protocol: TCP
          port: 8080
