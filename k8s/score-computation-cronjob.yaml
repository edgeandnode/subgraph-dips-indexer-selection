apiVersion: v1
kind: Namespace
metadata:
  name: subgraph-dips-indexer-selection-iisa-daily-cronjob-samuel
  labels:
    app: iisa-score-computation
    owner: samuel
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: score-computation
  namespace: subgraph-dips-indexer-selection-iisa-daily-cronjob-samuel
  labels:
    app: iisa-score-computation
spec:
  schedule: "0 9 * * *"  # Daily at 09:00 UTC (after dbt pipeline refreshes upstream tables at ~08:00 UTC)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: iisa-score-computation
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          imagePullSecrets:
          - name: github-registry-secret
          containers:
          - name: compute-scores
            image: ghcr.io/edgeandnode/subgraph-dips-indexer-selection-cronjob:sha-c8c33d4
            imagePullPolicy: Always
            resources:
              requests:
                memory: "50Gi"
                cpu: "2"
              limits:
                memory: "50Gi"
                cpu: "8"
            env:
            - name: NUM_DAYS
              value: "28"
            - name: TARGET_ROWS
              value: "20000000"
            - name: REDPANDA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: iisa-redpanda-credentials
                  key: REDPANDA_BOOTSTRAP_SERVERS
            - name: REDPANDA_TOPIC
              value: "gateway_queries"
            - name: GRAPH_NETWORK_SUBGRAPH_URL
              valueFrom:
                secretKeyRef:
                  name: iisa-redpanda-credentials
                  key: GRAPH_NETWORK_SUBGRAPH_URL
            - name: REDPANDA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: iisa-redpanda-credentials
                  key: REDPANDA_SASL_USERNAME
            - name: REDPANDA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iisa-redpanda-credentials
                  key: REDPANDA_SASL_PASSWORD
            - name: IISA_API_URL
              value: "http://iisa:8080"
            - name: IISA_PUSH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: iisa-push-token
                  key: IISA_PUSH_TOKEN
            - name: IISA_REQUIRE_PUSH_TOKEN
              value: "true"
            - name: REDPANDA_GATEWAY_IDS
              value: ""
            # Minimum PEP 440 graph-node version; empty disables the filter.
            # Pinned to graph-node v0.43.0 — see
            # https://github.com/graphprotocol/graph-node/releases/tag/v0.43.0
            - name: MIN_GRAPH_NODE_VERSION
              value: "0.43.0"
            # Strict: drop indexers whose /status was unreachable, malformed,
            # or missing the version field. Flip to "false" to keep unknowns
            # in the pool (the rollout-window posture).
            - name: MIN_GRAPH_NODE_VERSION_STRICT
              value: "true"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
          restartPolicy: Never
