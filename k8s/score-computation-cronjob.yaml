apiVersion: v1
kind: Namespace
metadata:
  name: subgraph-dips-indexer-selection-iisa-daily-cronjob-samuel
  labels:
    app: iisa-score-computation
    owner: samuel
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: score-computation
  namespace: subgraph-dips-indexer-selection-iisa-daily-cronjob-samuel
  labels:
    app: iisa-score-computation
spec:
  schedule: "0 9 * * *"  # Daily at 09:00 UTC (after dbt pipeline refreshes upstream tables at ~08:00 UTC)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          imagePullSecrets:
          - name: dockerhub-pull-secret
          containers:
          - name: compute-scores
            image: dockermoonboi9001/iisa-score-computation:sha-d09d11c
            imagePullPolicy: Always
            resources:
              requests:
                memory: "64Gi"
                cpu: "2"
              limits:
                memory: "64Gi"
                cpu: "8"
            env:
            - name: DATA_SOURCE
              value: "bigquery"  # Set to "redpanda" for local-network mode
            - name: BQ_PROJECT
              value: "graph-mainnet"
            - name: BQ_DATASET
              value: "iisa_data_for_dips"
            - name: BQ_LOCATION
              value: "US"
            - name: NUM_DAYS
              value: "28"
            - name: TARGET_ROWS
              value: "20000000"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /app/credentials/service-account.json
            # Redpanda mode env vars (used when DATA_SOURCE=redpanda)
            - name: REDPANDA_BOOTSTRAP_SERVERS
              value: ""  # e.g. redpanda:9092
            - name: REDPANDA_TOPIC
              value: "gateway_queries"
            - name: GRAPH_NETWORK_SUBGRAPH_URL
              value: ""  # e.g. http://graph-node:8000/subgraphs/name/graph-network
            - name: REDPANDA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: iisa-redpanda-credentials
                  key: sasl_username
                  optional: true
            - name: REDPANDA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iisa-redpanda-credentials
                  key: sasl_password
                  optional: true
            - name: SCORES_FILE_PATH
              value: "/app/scores/indexer_scores.json"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            volumeMounts:
            - name: gcp-credentials
              mountPath: /app/credentials
              readOnly: true
            - name: scores
              mountPath: /app/scores
          restartPolicy: Never
          volumes:
          - name: gcp-credentials
            secret:
              secretName: iisa-gcp-credentials
          - name: scores
            persistentVolumeClaim:
              claimName: iisa-scores
